# /etc/claude-code-model-gateway/gateway.yaml
# Main configuration file for claude-code-model-gateway
#
# This file is loaded at service startup. Environment variables in the
# 'environment' file take precedence over values defined here.

# Default AI provider to use when none is specified
default_provider: anthropic

# Global log level: debug, info, warning, error
log_level: info

# Default upstream connection timeout (seconds)
timeout: 300

# Maximum retry attempts for failed upstream requests
max_retries: 3

# ---------------------------------------------------------------------------
# Provider configuration
# ---------------------------------------------------------------------------
